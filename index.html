<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Love Journey ❤️</title>

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

body{
background:linear-gradient(to bottom,#fff,#f3e8ff,#fdf2f8);
overflow-x:hidden;
}

.music-btn{
background:linear-gradient(45deg,#7c3aed,#9333ea);
box-shadow:0 10px 20px rgba(124,58,237,.3);
}

.photo{
width:100%;
max-width:320px;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.photo img{
width:100%;
display:block;
}

.card{
background:white;
border-radius:20px;
padding:18px;
box-shadow:0 10px 20px rgba(0,0,0,.08);
}

.heart{
position:fixed;
bottom:-50px;
color:#ff4d6d;
animation:float 7s linear infinite;
pointer-events:none;
}

@keyframes float{

0%{
transform:translateY(0) scale(.5);
opacity:1;
}

100%{
transform:translateY(-110vh) scale(1.5);
opacity:0;
}

}

</style>

</head>

<body class="text-center p-4">

<div class="fixed top-4 left-0 right-0 z-50">

<button id="playBtn"
class="music-btn text-white px-6 py-3 rounded-full font-bold">

<i id="icon" class="fas fa-play"></i>

<span id="text">
Mana Special Song Play Chey 🎵
</span>

</button>

</div>

<audio id="music" loop>

<source src="music.mp3" type="audio/mp3">

</audio>

<div class="mt-28">

<h1 class="text-4xl font-extrabold text-purple-700 animate__animated animate__heartBeat animate__infinite">

I Miss You Bangaram ❤️

</h1>

<p class="mt-3 text-gray-700">

Every moment with you is my favorite memory...

</p>

<div class="mt-12 photo animate__animated animate__fadeInUp">

<img src="photo1.jpeg.png">

</div>

<div class="card mt-5">

<p class="italic text-gray-700">

Mana madhya enni godavalu jarigina mana prema eppatiki thaggadhu...

Nee navvu naa happiness...

I miss you so much Bangaram ❤️

</p>

</div>

<div class="mt-12 photo animate__animated animate__fadeInUp">

<img src="photo2.jpeg.jpg">

</div>

<div class="card mt-5">

<p class="italic text-gray-700">

Konni sarlu ninnu badha petta...

Kani ninnu vadulukolekapoya...

Please naatho matladava Bangaram ❤️

</p>

</div>
